parameters:
    vendoring.dsn: 'sqlite:%kernel.project_dir%/var/vendor.sqlite'
    vendor.dsn: '%vendoring.dsn%'
    vendor.sqlite_dsn: 'sqlite:%kernel.project_dir%/var/vendor-system.sqlite'

doctrine:
    dbal:
        default_connection: user_data
        connections:
            user_data:
                url: '%env(default:vendor.dsn:VENDOR_DSN)%'
            app_data:
                url: '%env(default:vendor.sqlite_dsn:VENDOR_SQLITE_DSN)%'
    orm:
        validate_xml_mapping: false
        entity_managers:
            default:
                connection: user_data
                mappings:
                    Vendoring:
                        type: attribute
                        dir: '%kernel.project_dir%/src/Entity/Vendor'
                        prefix: 'App\Vendoring\Entity\Vendor'
                        is_bundle: false
