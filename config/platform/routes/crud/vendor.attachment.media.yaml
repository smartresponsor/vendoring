# ---------------------------------------------------------------------------
# Cruding token grammar
# ---------------------------------------------------------------------------
# This file is a route-map registry/protocol file for the current Cruding parser.
#
# Current Cruding catch-all grammar:
#   API CRUD:
#     /api/{resourcePath}
#     /api/{resourcePath}/{slug}
#
#   Surface:
#     /{resource}/{subject}/{surface}
#     /{resource}/{subject}/{surface}/{action}
#     /{resource}/{subject}/{surface}/{item}/{action}
#     /{resource}/{subject}/{surface}/{token}/{item}
#     /{resource}/{subject}/{surface}/{token}/{item}/{action}
#
#   Classic CRUD:
#     /{resourcePath}/new/
#     /{resourcePath}/edit/{id}
#     /{resourcePath}/edit/{slug}
#     /{resourcePath}/delete/{id}
#     /{resourcePath}/delete/{slug}
#     /{resourcePath}/{id}
#     /{resourcePath}/{slug}
#     /{resourcePath}
#
# Token meaning:
#   resource      = first business/root token allowed by APP_RUNTIME_ENTITY
#   subject       = second business token
#   surface       = visual/object/surface token
#   token         = operation/surface token when grammar has 5+ segments
#   item          = item identifier value
#   action        = final operation token
#   resourcePath  = slash-aware classic CRUD resource path
#   id            = internal/admin/system identifier
#   slug          = public/outdoor/human identifier
#
# Runtime guard:
#   first URI token must be allowed by APP_RUNTIME_ENTITY.
#   reserved component roots must not be captured as business resources.
#
# Canon:
#   routeKey keeps full business chain, for example:
#     vendor.attachment.document.show
#   template target may stay short, for example:
#     document/show/index.html.twig
#   no {ref}; use {id}/{slug}; use semantic {productId}/{mediaId} for relations.
# ---------------------------------------------------------------------------

