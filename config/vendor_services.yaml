imports:
    - { resource: 'vendor_services_transactions.yaml' }

parameters:
    vendoring_secret: 'vendoring-dev-secret'
    vendoring_feature_flags: { }

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    App\:
        resource: '../src/'
        exclude:
            - '../src/DTO/'
            - '../src/Entity/'
            - '../src/EntityInterface/'
            - '../src/Event/'
            - '../src/Kernel.php'
            - '../src/RepositoryInterface/'
            - '../src/ServiceInterface/'
            - '../src/ValueObject/'
            - '../src/Form/'
            - '../src/Controller/'

    App\Controller\:
        resource: '../src/Controller/'
        tags: [ 'controller.service_arguments' ]

    App\RepositoryInterface\VendorAnalyticsRepositoryInterface: '@App\Repository\VendorAnalyticsRepository'
    App\RepositoryInterface\VendorAttachmentRepositoryInterface: '@App\Repository\VendorAttachmentRepository'
    App\RepositoryInterface\VendorDocumentRepositoryInterface: '@App\Repository\VendorDocumentRepository'
    App\RepositoryInterface\VendorLedgerBindingRepositoryInterface: '@App\Repository\VendorLedgerBindingRepository'
    App\RepositoryInterface\VendorSecurityRepositoryInterface: '@App\Repository\VendorSecurityRepository'
    App\RepositoryInterface\VendorUserAssignmentRepositoryInterface: '@App\Repository\VendorUserAssignmentRepository'
    App\RepositoryInterface\VendorTransactionRepositoryInterface: '@App\Repository\VendorTransactionRepository'

    App\ServiceInterface\VendorCrmServiceInterface: '@App\Service\VendorCrmService'
    App\ServiceInterface\Security\VendorAuthorizationMatrixInterface: '@App\Service\Security\VendorAuthorizationMatrix'
    App\ServiceInterface\Security\VendorAccessResolverInterface: '@App\Service\Security\VendorAccessResolver'
    App\ServiceInterface\VendorBillingServiceInterface: '@App\Service\VendorBillingService'
    App\ServiceInterface\Observability\CorrelationContextInterface: '@App\Observability\Service\CorrelationContext'
    App\ServiceInterface\Observability\MetricCollectorInterface: '@App\Observability\Service\ChainMetricCollector'
    App\ServiceInterface\Observability\RuntimeLoggerInterface: '@App\Observability\Service\RuntimeLogger'
    App\ServiceInterface\Traffic\WriteRateLimiterInterface: '@App\Service\Traffic\FileWriteRateLimiter'
    App\ServiceInterface\Rollout\TrafficCohortResolverInterface: '@App\Service\Rollout\TrafficCohortResolver'
    App\ServiceInterface\Rollout\FeatureFlagServiceInterface: '@App\Service\Rollout\FeatureFlagService'
    App\ServiceInterface\CatalogMerchServiceInterface: '@App\Service\CatalogMerchService'
    App\ServiceInterface\CatalogSyndicationMappingServiceInterface: '@App\Service\CatalogSyndicationMappingService'
    App\ServiceInterface\CatalogSyndicationFallbackAwarePackageGateServiceInterface: '@App\Service\CatalogSyndicationFallbackAwarePackageGateService'
    App\ServiceInterface\CatalogSyndicationPolicyAwarePackageGateServiceInterface: '@App\Service\CatalogSyndicationPolicyAwarePackageGateService'
    App\ServiceInterface\CatalogSyndicationGovernanceTrailServiceInterface: '@App\Service\CatalogSyndicationGovernanceTrailService'
    App\ServiceInterface\CatalogDestinationMediaReadinessServiceInterface: '@App\Service\CatalogDestinationMediaReadinessService'
    App\ServiceInterface\CatalogDestinationMediaFallbackServiceInterface: '@App\Service\CatalogDestinationMediaFallbackService'
    App\ServiceInterface\CatalogDestinationMediaPolicyPreferenceServiceInterface: '@App\Service\CatalogDestinationMediaPolicyPreferenceService'
    App\ServiceInterface\VendorDocumentServiceInterface: '@App\Service\VendorDocumentService'
    App\ServiceInterface\VendorMediaServiceInterface: '@App\Service\VendorMediaService'
    App\ServiceInterface\VendorPassportServiceInterface: '@App\Service\VendorPassportService'
    App\ServiceInterface\VendorProfileServiceInterface: '@App\Service\VendorProfileService'
    App\ServiceInterface\VendorServiceInterface: '@App\Service\VendorService'
    App\ServiceInterface\VendorUserAssignmentServiceInterface: '@App\Service\VendorUserAssignmentService'
    App\ServiceInterface\Ledger\VendorDoubleEntryServiceInterface: '@App\Service\Ledger\VendorDoubleEntryService'
    App\ServiceInterface\Ledger\VendorLedgerServiceInterface: '@App\Service\Ledger\VendorLedgerService'
    App\ServiceInterface\Ops\VendorTransactionOperatorPageBuilderInterface: '@App\Service\Ops\VendorTransactionOperatorPageBuilder'
    App\ServiceInterface\Category\CategoryApproxTotalServiceInterface: '@App\Service\Category\CategoryApproxTotalService'
    App\ServiceInterface\Category\CategoryCollectionServiceInterface: '@App\Service\Category\CategoryCollectionService'
    App\ServiceInterface\Category\CategoryRuleEngineInterface: '@App\Service\Category\Rule\CategoryRuleEngine'
    App\ServiceInterface\Category\CategoryRuleSuggestServiceInterface: '@App\Service\Category\Suggest\CategoryRuleSuggestService'
    App\ServiceInterface\Search\TfidfSearchInterface: '@App\Service\Search\TfidfSearch'
    App\ServiceInterface\Sec\HmacInterface: '@App\Service\Sec\Hmac'
    App\ServiceInterface\Payout\VendorPayoutProviderServiceInterface: '@App\Service\Payout\VendorPayoutProviderService'
    App\ServiceInterface\Payout\VendorSettlementCalculatorServiceInterface: '@App\Service\Payout\VendorSettlementCalculatorService'
    App\RepositoryInterface\VendorApiKeyRepositoryInterface: '@App\Repository\VendorApiKeyRepository'
    App\RepositoryInterface\VendorRepositoryInterface: '@App\Repository\VendorRepository'
    App\RepositoryInterface\VendorProfileRepositoryInterface: '@App\Repository\VendorProfileRepository'
    App\RepositoryInterface\VendorBillingRepositoryInterface: '@App\Repository\VendorBillingRepository'
    App\RepositoryInterface\VendorMediaRepositoryInterface: '@App\Repository\VendorMediaRepository'
    App\RepositoryInterface\VendorPassportRepositoryInterface: '@App\Repository\VendorPassportRepository'
    App\RepositoryInterface\Ledger\LedgerEntryRepositoryInterface: '@App\Repository\Ledger\LedgerEntryRepository'
    App\RepositoryInterface\Payout\PayoutRepositoryInterface: '@App\Repository\Payout\PayoutRepository'
    App\RepositoryInterface\Payout\PayoutAccountRepositoryInterface: '@App\Repository\Payout\PayoutAccountRepository'

    App\ServiceInterface\VendorApiKeyServiceInterface: '@App\Service\VendorApiKeyService'
    App\ServiceInterface\VendorSecurityServiceInterface: '@App\Service\VendorSecurityService'
    App\ServiceInterface\VendorSecurityStateViewBuilderInterface: '@App\Service\VendorSecurityStateViewBuilder'
    App\ServiceInterface\VendorOwnershipViewBuilderInterface: '@App\Service\VendorOwnershipViewBuilder'
    App\ServiceInterface\VendorFinanceRuntimeViewBuilderInterface: '@App\Service\VendorFinanceRuntimeViewBuilder'
    App\ServiceInterface\Integration\VendorExternalIntegrationRuntimeViewBuilderInterface: '@App\Service\Integration\VendorExternalIntegrationRuntimeViewBuilder'
    App\ServiceInterface\Ops\VendorRuntimeStatusViewBuilderInterface: '@App\Service\Ops\VendorRuntimeStatusViewBuilder'
    App\ServiceInterface\Ops\VendorReleaseBaselineReaderInterface: '@App\Service\Ops\VendorReleaseBaselineReader'
    App\ServiceInterface\VendorTransactionManagerInterface: '@App\Service\VendorTransactionManager'
    App\ServiceInterface\VendorTransactionInputResolverServiceInterface: '@App\Service\VendorTransactionInputResolverService'
    App\ServiceInterface\Policy\VendorTransactionStatusPolicyInterface: '@App\Service\Policy\VendorTransactionStatusPolicy'
    App\ServiceInterface\Policy\VendorTransactionAmountPolicyInterface: '@App\Service\Policy\VendorTransactionAmountPolicy'
    App\ServiceInterface\Metric\VendorMetricServiceInterface: '@App\Service\Metric\VendorMetricService'
    App\ServiceInterface\Payout\VendorPayoutServiceInterface: '@App\Service\Payout\VendorPayoutService'
    App\ServiceInterface\Payout\VendorPayoutRequestServiceInterface: '@App\Service\Payout\VendorPayoutRequestService'
    App\ServiceInterface\Payout\VendorPayoutAccountServiceInterface: '@App\Service\Payout\VendorPayoutAccountService'
    App\ServiceInterface\Ledger\VendorSummaryServiceInterface: '@App\Service\Ledger\VendorSummaryService'
    App\ServiceInterface\Statement\VendorStatementServiceInterface: '@App\Service\Statement\VendorStatementService'
    App\ServiceInterface\Statement\StatementExporterPDFInterface: '@App\Service\Statement\StatementExporterPDF'
    App\ServiceInterface\Statement\VendorStatementMailerServiceInterface: '@App\Service\Statement\VendorStatementMailerService'
    App\ServiceInterface\Statement\VendorStatementRecipientProviderInterface: '@App\Service\Statement\VendorStatementRecipientProvider'
    App\ServiceInterface\Statement\VendorStatementDeliveryRuntimeViewBuilderInterface: '@App\Service\Statement\VendorStatementDeliveryRuntimeViewBuilder'
    App\ServiceInterface\WebhooksConsumer\VendorWebhooksConsumerServiceInterface: '@App\Service\WebhooksConsumer\VendorWebhooksConsumerService'
    App\PolicyInterface\CategorySyndicationMappingPolicyInterface: '@App\Policy\CategorySyndicationMappingPolicy'
    App\PolicyInterface\CategorySyndicationFallbackAwarePackageGatePolicyInterface: '@App\Policy\CategorySyndicationFallbackAwarePackageGatePolicy'
    App\PolicyInterface\CategorySyndicationPolicyAwarePackageGatePolicyInterface: '@App\Policy\CategorySyndicationPolicyAwarePackageGatePolicy'
    App\PolicyInterface\CategorySyndicationGovernanceTrailPolicyInterface: '@App\Policy\CategorySyndicationGovernanceTrailPolicy'

    App\Observability\Service\MetricEmitter:
        public: false

    App\Observability\Service\RuntimeMetricCollector:
        public: false

    App\Observability\Service\ChainMetricCollector:
        arguments:
            $collectors:
                - '@App\Observability\Service\MetricEmitter'
                - '@App\Observability\Service\RuntimeMetricCollector'

    App\Service\Rollout\FeatureFlagService:
        arguments:
            $flags: '%vendoring_feature_flags%'
