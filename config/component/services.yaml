imports:
  - { resource: '../vendor_services_transactions.yaml' }

parameters:
  vendoring_secret: '%kernel.secret%'
  vendoring_feature_flags: { }
  vendoring_observability_dir: '%kernel.project_dir%/var/observability'
  vendoring_fault_tolerance_dir: '%kernel.project_dir%/var/fault-tolerance'
  vendoring_alert_thresholds:
    errorLogThreshold: 1
    openBreakerThreshold: 1
    missingProbeThreshold: 1
  vendoring_rollback_thresholds:
    criticalAlertCodes: [ 'outbound_circuit_open' ]
    warningAlertCodes: [ 'runtime_error_spike', 'probe_artifacts_missing', 'observability_metrics_empty' ]

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  # Canonical reusable-bundle service export surface.
  # The host application should import this file rather than maintain a second parallel graph.
  App\Vendoring\:
    resource: '../../src/'
    exclude:
      - '../../src/DTO/'
      - '../../src/DependencyInjection/'
      - '../../src/Entity/'
      - '../../src/EntityInterface/'
      - '../../src/Event/'
      - '../../src/Kernel.php'
      - '../../src/RepositoryInterface/'
      - '../../src/ServiceInterface/'
      - '../../src/ValueObject/'
      - '../../src/Form/'
      - '../../src/Controller/'

  App\Vendoring\Controller\:
    resource: '../../src/Controller/'
    tags: [ 'controller.service_arguments' ]

  App\Vendoring\RepositoryInterface\Vendor\VendorAnalyticsRepositoryInterface: '@App\Vendoring\Repository\Vendor\VendorAnalyticsRepository'
  App\Vendoring\RepositoryInterface\Vendor\VendorAttachmentRepositoryInterface: '@App\Vendoring\Repository\Vendor\VendorAttachmentRepository'
  App\Vendoring\RepositoryInterface\Vendor\VendorDocumentRepositoryInterface: '@App\Vendoring\Repository\Vendor\VendorDocumentRepository'
  App\Vendoring\RepositoryInterface\Vendor\VendorLedgerBindingRepositoryInterface: '@App\Vendoring\Repository\Vendor\VendorLedgerBindingRepository'
