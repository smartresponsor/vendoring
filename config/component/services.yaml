parameters:
  vendoring_observability_dir: '%kernel.project_dir%/var/observability'
  vendoring_fault_tolerance_dir: '%kernel.project_dir%/var/fault-tolerance'

services:
  _defaults:
    autowire: true
    autoconfigure: true

  # Symfony-native component export surface.
  # The host application may import this file from the component root.
  App\Vendoring\:
    resource: '../../src/'
    exclude:
      - '../../src/Kernel.php'
      - '../../src/DependencyInjection/'
      - '../../src/Entity/'
      - '../../src/Tests/'

  App\Vendoring\Observability\Service\FileObservabilityRecordExporter:
    arguments:
      $observabilityDir: '%vendoring_observability_dir%'

  App\Vendoring\Observability\Service\MonitoringSnapshotBuilder:
    arguments:
      $observabilityDir: '%vendoring_observability_dir%'
      $faultToleranceDir: '%vendoring_fault_tolerance_dir%'
      $projectDir: '%kernel.project_dir%'

  App\Vendoring\Repository\VendorCatalogCategoryChangeRequestRepository: ~
  App\Vendoring\Repository\VendorCatalogReviewAssignmentRepository: ~
  
  App\Vendoring\Service\Ops\ReleaseManifestBuilder:
    arguments:
      $projectDir: '%kernel.project_dir%'
  App\Vendoring\ServiceInterface\Observability\MetricCollectorInterface:
    alias: App\Vendoring\Observability\Service\RuntimeMetricCollector
  App\Vendoring\Service\Reliability\FileOutboundCircuitBreaker:
    arguments:
      $stateDir: '%vendoring_fault_tolerance_dir%'