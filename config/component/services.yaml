# Wave 16 reconciles service registration with the restored Vendoring persistence surface.

parameters:
  vendoring_secret: '%kernel.secret%'
  vendoring_feature_flags: { }
  vendoring_observability_dir: '%kernel.project_dir%/var/observability'
  vendoring_fault_tolerance_dir: '%kernel.project_dir%/var/fault-tolerance'
  vendoring_alert_thresholds:
    errorLogThreshold: 1
    openBreakerThreshold: 1
    missingProbeThreshold: 1
  vendoring_public_profile_path_template: '/vendor/{vendorId}'
  vendoring_rollback_thresholds:
    criticalAlertCodes: [ 'outbound_circuit_open' ]
    warningAlertCodes: [ 'runtime_error_spike', 'probe_artifacts_missing', 'observability_metrics_empty' ]

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  # Canonical reusable-bundle service export surface.
  # The host application should import this file rather than maintain a second parallel graph.
  App\Vendoring\:
    resource: '../../src/'
    exclude:
      - '../../src/DTO/'
      - '../../src/DataFixtures/'
      - '../../src/DependencyInjection/'
      - '../../src/Entity/'
      - '../../src/EntityInterface/'
      - '../../src/Event/'
      - '../../src/Kernel.php'
      - '../../src/RepositoryInterface/'
      - '../../src/ServiceInterface/'
      - '../../src/Support/'
      - '../../src/Service/Http/'
      - '../../src/Service/Profile/Bridge/'
      - '../../src/ValueObject/'
      - '../../src/Form/'

      # Optional bridge coordinator is registered only when the host imports
      # config/component/optional/attaching_profile_bridge.yaml.
      - '../../src/Service/Profile/VendorChainedProfileAttachmentResolverService.php'



  # Canonical zero-controller HTTP surface services resolved by Cruding FQCN convention.
  App\Vendoring\Service\Http\:
    resource: '../../src/Service/Http/'
    exclude:
      - '../../src/Service/Http/**/*Trait.php'
      - '../../src/Service/Http/Vendor/VendorApiErrorResponseTrait.php'
      - '../../src/Service/Http/Vendor/VendorBusinessOperationHttpTrait.php'
      - '../../src/Service/Http/Vendor/VendorHttpRequestTrait.php'
      - '../../src/Service/Http/Vendor/VendorStatementRequestHttpResolutionTrait.php'
      - '../../src/Service/Http/Vendor/Ownership/VendorOwnershipMutationService.php'
  App\Vendoring\Service\Http\Vendor\VendorIndexService:
    public: true
  App\Vendoring\Service\Http\Vendor\VendorShowService:
    public: true
  App\Vendoring\Service\Http\Vendor\VendorNewService:
    public: true
  App\Vendoring\Service\Http\Vendor\VendorCreateService:
    public: true
  App\Vendoring\Service\Http\Vendor\VendorEditService:
    public: true
  App\Vendoring\Service\Http\Vendor\VendorUpdateService:
    public: true
  App\Vendoring\Service\Http\Vendor\VendorDeleteService:
    public: true
  App\Vendoring\ServiceInterface\Crud\VendorCrudServiceInterface:
    alias: App\Vendoring\Service\Crud\VendorCrudService
  App\Vendoring\Form\:
    resource: '../../src/Form/'




