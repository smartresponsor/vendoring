imports:
  - { resource: '../vendor_services_transactions.yaml' }

parameters:
  vendoring_secret: '%kernel.secret%'
  vendoring_feature_flags: { }
  vendoring_observability_dir: '%kernel.project_dir%/var/observability'
  vendoring_fault_tolerance_dir: '%kernel.project_dir%/var/fault-tolerance'
  vendoring_alert_thresholds:
    errorLogThreshold: 1
    openBreakerThreshold: 1
    missingProbeThreshold: 1
  vendoring_rollback_thresholds:
    criticalAlertCodes: [ 'outbound_circuit_open' ]
    warningAlertCodes: [ 'runtime_error_spike', 'probe_artifacts_missing', 'observability_metrics_empty' ]

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  # Canonical reusable-bundle service export surface.
  # The host application should import this file rather than maintain a second parallel graph.
  App\Vendoring\:
    resource: '../../src/'
    exclude:
      - '../../src/DTO/'
      - '../../src/DependencyInjection/'
      - '../../src/Entity/'
      - '../../src/EntityInterface/'
      - '../../src/Event/'
      - '../../src/Kernel.php'
      - '../../src/RepositoryInterface/'
      - '../../src/ServiceInterface/'
      - '../../src/ValueObject/'
      - '../../src/Form/'
      - '../../src/Controller/'

  App\Vendoring\Controller\:
    resource: '../../src/Controller/'
    tags: [ 'controller.service_arguments' ]

  App\Vendoring\RepositoryInterface\VendorAnalyticsRepositoryInterface: '@App\Vendoring\Repository\VendorAnalyticsRepository'
  App\Vendoring\RepositoryInterface\VendorAttachmentRepositoryInterface: '@App\Vendoring\Repository\VendorAttachmentRepository'
  App\Vendoring\RepositoryInterface\VendorDocumentRepositoryInterface: '@App\Vendoring\Repository\VendorDocumentRepository'
  App\Vendoring\RepositoryInterface\VendorLedgerBindingRepositoryInterface: '@App\Vendoring\Repository\VendorLedgerBindingRepository'
  App\Vendoring\RepositoryInterface\VendorSecurityRepositoryInterface: '@App\Vendoring\Repository\VendorSecurityRepository'
  App\Vendoring\RepositoryInterface\VendorUserAssignmentRepositoryInterface: '@App\Vendoring\Repository\VendorUserAssignmentRepository'
  App\Vendoring\RepositoryInterface\VendorTransactionRepositoryInterface: '@App\Vendoring\Repository\VendorTransactionRepository'

  App\Vendoring\ServiceInterface\VendorCrmServiceInterface: '@App\Vendoring\Service\VendorCrmService'
  App\Vendoring\ServiceInterface\Policy\OutboundOperationPolicyInterface: '@App\Vendoring\Service\Policy\OutboundOperationPolicy'
  App\Vendoring\ServiceInterface\Reliability\OutboundCircuitBreakerInterface: '@App\Vendoring\Service\Reliability\FileOutboundCircuitBreaker'
  App\Vendoring\ServiceInterface\Security\VendorAuthorizationMatrixInterface: '@App\Vendoring\Service\Security\VendorAuthorizationMatrix'
  App\Vendoring\ServiceInterface\Security\VendorAccessResolverInterface: '@App\Vendoring\Service\Security\VendorAccessResolver'
  App\Vendoring\ServiceInterface\VendorBillingServiceInterface: '@App\Vendoring\Service\VendorBillingService'
  App\Vendoring\ServiceInterface\Observability\CorrelationContextInterface: '@App\Vendoring\Observability\Service\CorrelationContext'
  App\Vendoring\ServiceInterface\Observability\ObservabilityRecordExporterInterface: '@App\Vendoring\Observability\Service\FileObservabilityRecordExporter'
  App\Vendoring\ServiceInterface\Observability\MetricCollectorInterface: '@App\Vendoring\Observability\Service\ChainMetricCollector'
  App\Vendoring\ServiceInterface\Observability\RuntimeLoggerInterface: '@App\Vendoring\Observability\Service\RuntimeLogger'
  App\Vendoring\ServiceInterface\Observability\MonitoringSnapshotBuilderInterface: '@App\Vendoring\Observability\Service\MonitoringSnapshotBuilder'
  App\Vendoring\ServiceInterface\Observability\AlertRuleEvaluatorInterface: '@App\Vendoring\Observability\Service\AlertRuleEvaluator'
  App\Vendoring\ServiceInterface\Traffic\WriteRateLimiterInterface: '@App\Vendoring\Service\Traffic\FileWriteRateLimiter'
  App\Vendoring\ServiceInterface\Rollout\TrafficCohortResolverInterface: '@App\Vendoring\Service\Rollout\TrafficCohortResolver'
  App\Vendoring\ServiceInterface\Rollout\FeatureFlagServiceInterface: '@App\Vendoring\Service\Rollout\FeatureFlagService'
  App\Vendoring\ServiceInterface\Rollout\CanaryRolloutCoordinatorInterface: '@App\Vendoring\Service\Rollout\CanaryRolloutCoordinator'
  App\Vendoring\ServiceInterface\CatalogMerchServiceInterface: '@App\Vendoring\Service\CatalogMerchService'
  App\Vendoring\ServiceInterface\CatalogSyndicationMappingServiceInterface: '@App\Vendoring\Service\CatalogSyndicationMappingService'
  App\Vendoring\ServiceInterface\CatalogSyndicationFallbackAwarePackageGateServiceInterface: '@App\Vendoring\Service\CatalogSyndicationFallbackAwarePackageGateService'
  App\Vendoring\ServiceInterface\CatalogSyndicationPolicyAwarePackageGateServiceInterface: '@App\Vendoring\Service\CatalogSyndicationPolicyAwarePackageGateService'
  App\Vendoring\ServiceInterface\CatalogSyndicationGovernanceTrailServiceInterface: '@App\Vendoring\Service\CatalogSyndicationGovernanceTrailService'
  App\Vendoring\ServiceInterface\CatalogDestinationMediaReadinessServiceInterface: '@App\Vendoring\Service\CatalogDestinationMediaReadinessService'
  App\Vendoring\ServiceInterface\CatalogDestinationMediaFallbackServiceInterface: '@App\Vendoring\Service\CatalogDestinationMediaFallbackService'
  App\Vendoring\ServiceInterface\CatalogDestinationMediaPolicyPreferenceServiceInterface: '@App\Vendoring\Service\CatalogDestinationMediaPolicyPreferenceService'
  App\Vendoring\ServiceInterface\VendorDocumentServiceInterface: '@App\Vendoring\Service\VendorDocumentService'
  App\Vendoring\ServiceInterface\VendorMediaServiceInterface: '@App\Vendoring\Service\VendorMediaService'
  App\Vendoring\ServiceInterface\VendorPassportServiceInterface: '@App\Vendoring\Service\VendorPassportService'
  App\Vendoring\ServiceInterface\VendorProfileServiceInterface: '@App\Vendoring\Service\VendorProfileService'
  App\Vendoring\ServiceInterface\VendorServiceInterface: '@App\Vendoring\Service\VendorService'
  App\Vendoring\ServiceInterface\VendorUserAssignmentServiceInterface: '@App\Vendoring\Service\VendorUserAssignmentService'
  App\Vendoring\ServiceInterface\Ledger\VendorDoubleEntryServiceInterface: '@App\Vendoring\Service\Ledger\VendorDoubleEntryService'
  App\Vendoring\ServiceInterface\Ledger\VendorLedgerServiceInterface: '@App\Vendoring\Service\Ledger\VendorLedgerService'
  App\Vendoring\ServiceInterface\Ops\VendorTransactionOperatorPageBuilderInterface: '@App\Vendoring\Service\Ops\VendorTransactionOperatorPageBuilder'
  App\Vendoring\ServiceInterface\Category\CategoryApproxTotalServiceInterface: '@App\Vendoring\Service\Category\CategoryApproxTotalService'
  App\Vendoring\ServiceInterface\Category\CategoryCollectionServiceInterface: '@App\Vendoring\Service\Category\CategoryCollectionService'
  App\Vendoring\ServiceInterface\Category\CategoryRuleEngineInterface: '@App\Vendoring\Service\Category\Rule\CategoryRuleEngine'
  App\Vendoring\ServiceInterface\Category\CategoryRuleSuggestServiceInterface: '@App\Vendoring\Service\Category\Suggest\CategoryRuleSuggestService'
  App\Vendoring\ServiceInterface\Search\TfidfSearchInterface: '@App\Vendoring\Service\Search\TfidfSearch'
  App\Vendoring\ServiceInterface\Sec\HmacInterface: '@App\Vendoring\Service\Sec\Hmac'
  App\Vendoring\ServiceInterface\Payout\VendorPayoutProviderServiceInterface: '@App\Vendoring\Service\Payout\VendorPayoutProviderService'
  App\Vendoring\ServiceInterface\Payout\VendorSettlementCalculatorServiceInterface: '@App\Vendoring\Service\Payout\VendorSettlementCalculatorService'
  App\Vendoring\RepositoryInterface\VendorApiKeyRepositoryInterface: '@App\Vendoring\Repository\VendorApiKeyRepository'
  App\Vendoring\RepositoryInterface\VendorRepositoryInterface: '@App\Vendoring\Repository\VendorRepository'
  App\Vendoring\RepositoryInterface\VendorProfileRepositoryInterface: '@App\Vendoring\Repository\VendorProfileRepository'
  App\Vendoring\RepositoryInterface\VendorBillingRepositoryInterface: '@App\Vendoring\Repository\VendorBillingRepository'
  App\Vendoring\RepositoryInterface\VendorMediaRepositoryInterface: '@App\Vendoring\Repository\VendorMediaRepository'
  App\Vendoring\RepositoryInterface\VendorPassportRepositoryInterface: '@App\Vendoring\Repository\VendorPassportRepository'
