    arguments:
      $observabilityDir: '%vendoring_observability_dir%'

  App\Vendoring\Service\Observability\VendorMonitoringSnapshotBuilderService:
    arguments:
      $observabilityDir: '%vendoring_observability_dir%'
      $faultToleranceDir: '%vendoring_fault_tolerance_dir%'
      $projectDir: '%kernel.project_dir%'

  App\Vendoring\Service\Observability\VendorAlertRuleEvaluatorService:
    arguments:
      $thresholds: '%vendoring_alert_thresholds%'

  App\Vendoring\Service\Reliability\VendorOutboundCircuitBreakerService:
    arguments:
      $stateDir: '%vendoring_fault_tolerance_dir%/circuit-breakers'

  App\Vendoring\Service\Observability\VendorMetricEmitterService:
    public: false

  App\Vendoring\Service\Observability\VendorRuntimeMetricCollectorService:
    public: false

  App\Vendoring\Service\Observability\VendorMetricCollectorService:
    arguments:
      $collectors:
        - '@App\Vendoring\Service\Observability\VendorMetricEmitterService'
