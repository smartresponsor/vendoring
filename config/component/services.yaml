  App\Vendoring\ServiceInterface\Api\StatementWindowQueryRequestResolverInterface: '@App\Vendoring\Service\Api\StatementWindowQueryRequestResolver'
  App\Vendoring\ServiceInterface\VendorSecurityServiceInterface: '@App\Vendoring\Service\VendorSecurityService'
  App\Vendoring\ServiceInterface\VendorSecurityStateViewBuilderInterface: '@App\Vendoring\Service\VendorSecurityStateViewBuilder'
  App\Vendoring\ServiceInterface\VendorOwnershipViewBuilderInterface: '@App\Vendoring\Service\VendorOwnershipViewBuilder'
  App\Vendoring\ServiceInterface\VendorProfileViewBuilderInterface: '@App\Vendoring\Service\VendorProfileViewBuilder'
  App\Vendoring\ServiceInterface\VendorFinanceRuntimeViewBuilderInterface: '@App\Vendoring\Service\VendorFinanceRuntimeViewBuilder'
  App\Vendoring\ServiceInterface\Integration\VendorExternalIntegrationRuntimeViewBuilderInterface: '@App\Vendoring\Service\Integration\VendorExternalIntegrationRuntimeViewBuilder'
  App\Vendoring\ServiceInterface\Ops\VendorRuntimeStatusViewBuilderInterface: '@App\Vendoring\Service\Ops\VendorRuntimeStatusViewBuilder'
  App\Vendoring\ServiceInterface\Ops\VendorReleaseBaselineReaderInterface: '@App\Vendoring\Service\Ops\VendorReleaseBaselineReader'
  App\Vendoring\ServiceInterface\Ops\ReleaseManifestBuilderInterface: '@App\Vendoring\Service\Ops\ReleaseManifestBuilder'
  App\Vendoring\ServiceInterface\Ops\RollbackDecisionEvaluatorInterface: '@App\Vendoring\Service\Ops\RollbackDecisionEvaluator'
  App\Vendoring\ServiceInterface\VendorTransactionManagerInterface: '@App\Vendoring\Service\VendorTransactionManager'
  App\Vendoring\ServiceInterface\VendorTransactionInputResolverServiceInterface: '@App\Vendoring\Service\VendorTransactionInputResolverService'
  App\Vendoring\ServiceInterface\Policy\VendorTransactionStatusPolicyInterface: '@App\Vendoring\Service\Policy\VendorTransactionStatusPolicy'
  App\Vendoring\ServiceInterface\Policy\VendorTransactionAmountPolicyInterface: '@App\Vendoring\Service\Policy\VendorTransactionAmountPolicy'
  App\Vendoring\ServiceInterface\Metric\VendorMetricServiceInterface: '@App\Vendoring\Service\Metric\VendorMetricService'
  App\Vendoring\ServiceInterface\Payout\VendorPayoutServiceInterface: '@App\Vendoring\Service\Payout\VendorPayoutService'
  App\Vendoring\ServiceInterface\Payout\VendorPayoutRequestServiceInterface: '@App\Vendoring\Service\Payout\VendorPayoutRequestService'
  App\Vendoring\ServiceInterface\Payout\VendorPayoutAccountServiceInterface: '@App\Vendoring\Service\Payout\VendorPayoutAccountService'
  App\Vendoring\ServiceInterface\Ledger\VendorSummaryServiceInterface: '@App\Vendoring\Service\Ledger\VendorSummaryService'
  App\Vendoring\ServiceInterface\Statement\VendorStatementServiceInterface: '@App\Vendoring\Service\Statement\VendorStatementService'
  App\Vendoring\ServiceInterface\Statement\StatementExporterPDFInterface: '@App\Vendoring\Service\Statement\StatementExporterPDF'
  App\Vendoring\ServiceInterface\Statement\VendorStatementMailerServiceInterface: '@App\Vendoring\Service\Statement\VendorStatementMailerService'
  App\Vendoring\ServiceInterface\Statement\VendorStatementRecipientProviderInterface: '@App\Vendoring\Service\Statement\VendorStatementRecipientProvider'
  App\Vendoring\ServiceInterface\Statement\VendorStatementDeliveryRuntimeViewBuilderInterface: '@App\Vendoring\Service\Statement\VendorStatementDeliveryRuntimeViewBuilder'
  App\Vendoring\ServiceInterface\Statement\VendorStatementRequestResolverInterface: '@App\Vendoring\Service\Statement\VendorStatementRequestResolver'
  App\Vendoring\ServiceInterface\WebhooksConsumer\VendorWebhooksConsumerServiceInterface: '@App\Vendoring\Service\WebhooksConsumer\VendorWebhooksConsumerService'
  App\Vendoring\PolicyInterface\CategorySyndicationMappingPolicyInterface: '@App\Vendoring\Policy\CategorySyndicationMappingPolicy'
  App\Vendoring\PolicyInterface\CategorySyndicationFallbackAwarePackageGatePolicyInterface: '@App\Vendoring\Policy\CategorySyndicationFallbackAwarePackageGatePolicy'
  App\Vendoring\PolicyInterface\CategorySyndicationPolicyAwarePackageGatePolicyInterface: '@App\Vendoring\Policy\CategorySyndicationPolicyAwarePackageGatePolicy'
  App\Vendoring\PolicyInterface\CategorySyndicationGovernanceTrailPolicyInterface: '@App\Vendoring\Policy\CategorySyndicationGovernanceTrailPolicy'

  App\Vendoring\Observability\Service\FileObservabilityRecordExporter:
    arguments:
      $observabilityDir: '%vendoring_observability_dir%'

  App\Vendoring\Observability\Service\MonitoringSnapshotBuilder:
    arguments:
      $observabilityDir: '%vendoring_observability_dir%'
      $faultToleranceDir: '%vendoring_fault_tolerance_dir%'
      $projectDir: '%kernel.project_dir%'

  App\Vendoring\Observability\Service\AlertRuleEvaluator:
    arguments:
      $thresholds: '%vendoring_alert_thresholds%'

  App\Vendoring\Service\Reliability\FileOutboundCircuitBreaker:
    arguments:
      $stateDir: '%vendoring_fault_tolerance_dir%/circuit-breakers'

  App\Vendoring\Observability\Service\MetricEmitter:
    public: false

  App\Vendoring\Observability\Service\RuntimeMetricCollector:
    public: false

  App\Vendoring\Observability\Service\ChainMetricCollector:
    arguments:
      $collectors:
        - '@App\Vendoring\Observability\Service\MetricEmitter'
        - '@App\Vendoring\Observability\Service\RuntimeMetricCollector'

  App\Vendoring\Service\Rollout\FeatureFlagService:
    arguments:
      $flags: '%vendoring_feature_flags%'

  App\Vendoring\Service\Ops\ReleaseManifestBuilder:
    arguments:
      $projectDir: '%kernel.project_dir%'

  App\Vendoring\Service\Ops\RollbackDecisionEvaluator:
    arguments:
      $thresholds: '%vendoring_rollback_thresholds%'

  App\Vendoring\Service\VendorProfileRequestResolver:
    arguments: []

  App\Vendoring\ServiceInterface\VendorProfileRequestResolverInterface: '@App\Vendoring\Service\VendorProfileRequestResolver'
  App\Vendoring\ServiceInterface\Ownership\VendorOwnershipWriteServiceInterface: '@App\Vendoring\Service\VendorOwnershipWriteService'
  App\Vendoring\ServiceInterface\Ownership\VendorOwnershipWriteRequestResolverInterface: '@App\Vendoring\Service\VendorOwnershipWriteRequestResolver'
