# Import this file from the host only when the component owns Doctrine entities.
# Entity classes remain component-owned and must not be used as external API contracts.
doctrine:
  orm:
    mappings:
      Vendoring:
        type: attribute
        is_bundle: false
        dir: '%kernel.project_dir%/vendor/vendoring/vendor/src/Entity'
        prefix: 'App\Vendoring\Entity\Vendor'
        alias: Vendoring
