component:
  schema_version: 1
  name: vendoring
  title: Vendoring
  package: vendoring/vendor
  status: rc
  namespace: App\Vendoring
  responsibility: "vendor, supplier, and partner registry surfaces"
  export_contract:
    services: config/component/services.yaml
    routes: config/component/routes.yaml
    api_platform: config/component/api_platform.yaml
    doctrine: config/component/doctrine.yaml
    messenger: config/component/messenger.yaml
    security: config/component/security.yaml
    env: config/component/env.yaml
    smoke: config/component/smoke.yaml
  host_policy:
    business_logic_owner: component
    composition_owner: host_application
    glue_layer_goal: near_zero
    transport_contracts: dto_api_resource_first
    entities_as_transport_contracts: false

  symfony_bundle:
    class: App\Vendoring\VendoringBundle
    extension: App\Vendoring\DependencyInjection\VendoringExtension
    services_loaded_by_extension: config/component/services.yaml
    routes_import_required_by_host: config/component/routes.yaml
