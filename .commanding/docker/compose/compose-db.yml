version: '3.9'

volumes:
  pg-data:
    name: '${SR_COMPOSE_PROJECT:-sr}-pg-data'
  my-data:
    name: '${SR_COMPOSE_PROJECT:-sr}-my-data'

services:
  db-pg:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SR_PG_DB:-app}
      POSTGRES_USER: ${SR_PG_USER:-app}
      POSTGRES_PASSWORD: ${SR_PG_PASS:-app}
      TZ: ${SR_TZ:-America/Chicago}
    ports:
      - '${SR_PG_PORT:-5432}:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 10

  db-my:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${SR_MY_DB:-app}
      MYSQL_USER: ${SR_MY_USER:-app}
      MYSQL_PASSWORD: ${SR_MY_PASS:-app}
      MYSQL_ROOT_PASSWORD: ${SR_MY_ROOT_PASS:-root}
      TZ: ${SR_TZ:-America/Chicago}
    ports:
      - '${SR_MY_PORT:-3306}:3306'
    command: ['--default-authentication-plugin=mysql_native_password']
    volumes:
      - my-data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" --silent']
      interval: 5s
      timeout: 5s
      retries: 20
