name: runtime

on:
  workflow_dispatch:

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_sqlite
      - run: composer install --no-interaction --prefer-dist
      - run: composer quality:runtime
      - run: composer quality:persistence
      - run: composer quality:api
      - name: Upload RC evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-release-evidence
          path: |
            build/release/**
