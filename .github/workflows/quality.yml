name: quality

on:
  workflow_dispatch:
  push:
    branches: ["master"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_sqlite
      - run: composer install --no-interaction --prefer-dist
      - run: composer quality:static
      - run: composer quality:contracts
