name: vendor-canon

on:
  pull_request:

permissions:
  contents: read

jobs:
  canon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run vendor canon scan
        shell: bash
        run: |
          mkdir -p .report
          node tools/canon/vendor-canon-scan.mjs

      - name: Run migration dialect guard
        shell: bash
        run: |
          mkdir -p .report
          node tools/canon/migration-dialect-guard.mjs

      - name: Upload canon report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vendor-canon-report
          path: |
            .report/**
          if-no-files-found: ignore
