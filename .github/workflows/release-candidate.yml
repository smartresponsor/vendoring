name: Vendoring Release Candidate

on:
  push:
  workflow_dispatch:

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, pdo, pdo_sqlite
      - run: composer install --no-interaction --prefer-dist
      - run: composer quality:release-candidate
      - name: Upload RC evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vendoring-rc-evidence
          path: build/release/**
